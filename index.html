const handleDelete = async (collectionName, docId) => {
    if (!docId) {
        alert("خطأ: لم يتم العثور على معرف الدرس (ID). تأكد من تحديث دالة الجلب.");
        return;
    }

    if (window.confirm("هل أنت متأكد من حذف هذا الدرس نهائياً؟")) {
        try {
            // استخدام db المعرف عندك في الكود
            await db.collection(collectionName).doc(docId).delete();
            alert("تم الحذف بنجاح");
        } catch (error) {
            console.error("Error deleting document: ", error);
            alert("فشل الحذف: " + error.message);
        }
    }
};

// دالة التعديل
const handleEdit = async (collectionName, docId, currentTitle, currentUrl) => {
    if (!docId) {
        alert("خطأ في المعرف (ID)");
        return;
    }

    const newTitle = window.prompt("تعديل الاسم:", currentTitle);
    const newUrl = window.prompt("تعديل الرابط:", currentUrl);

    if (newTitle && newUrl) {
        try {
            await db.collection(collectionName).doc(docId).update({
                title: newTitle,
                url: newUrl
            });
            alert("تم التعديل بنجاح");
        } catch (error) {
            console.error("Error updating document: ", error);
            alert("فشل التعديل: " + error.message);
        }
    }
};

          const addMaterial = async (e) => {
  e.preventDefault();

  const form = e.target;

  // 1. تحديد اسم المادة (سواء من المودال أو الفورم العادي)
  const subjectName = modalSubjectData ? modalSubjectData.subject : (customSubject || form.subject?.value || "عام");

  // 2. قراءة الرابط والنوع (دول بس اللي بنحتاجهم من الأدمن)
  const urlValue = form.url?.value;
  const typeValue = form.type?.value || "pdf";

  if (!urlValue) {
    alert("يا هندسة، الرابط وين؟ لازم تضع الرابط أولاً");
    return;
  }

  // 3. تجهيز البيانات (هنا بنحط اسم تلقائي للدرس عشان الفايربيز ما يزعل)
  const data = {
    subject: subjectName,
    // حيسمي الدرس تلقائياً باسم المادة + " - محتوى جديد"
    title: subjectName + " - محتوى جديد", 
    url: urlValue,
    type: typeValue,
    yearId: modalSubjectData ? String(modalSubjectData.yearId) : (form.yearId?.value || null),
    semesterId: modalSubjectData ? String(modalSubjectData.semesterId) : (form.semesterId?.value || null),
    category: adminAddMode || 'academic',
    createdAt: new Date()
  };

  try {
    // 4. الرفع المباشر
    await db.collection("materials").add(data); 

    alert("✅ تم الرفع بنجاح بدون الحاجة لاسم الدرس");

    // تنظيف الفورم وقفل المودال
    form.reset();
    if(typeof setIsModalOpen === 'function') setIsModalOpen(false);

  } catch (error) {
    console.error("Firebase Error:", error);
    alert("فشل الرفع: " + error.message);
  }
};

                    {lang === 'ar' ? "إضافة محاضرة جديدة" : "Add New Lecture"}
                </h2>
                <p className={`text-sm ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>
                    المادة المحددة: <strong className={darkMode ? 'text-white' : 'text-black'}>{modalSubjectData.subject}</strong>
                </p>
            </div>

          <form onSubmit={async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    
    // تجهيز البيانات
    const newLecture = {
        title: formData.get('title'),
        url: formData.get('url'),
        type: formData.get('type'), // فيديو، pdf، exam، reference
        category: 'academic',
        subject: modalSubjectData.subject,
        yearId: String(modalSubjectData.yearId),
        semesterId: String(modalSubjectData.semesterId),
        createdAt: firebase.firestore.FieldValue.serverTimestamp() // توقيت عالمي
    };

    try {
        // استخدام db المعرف عندك في السكريبت الأول
        // تأكد أن اسم الكولكشن 'materials' مطابق للـ useEffect في سطر 116
        await db.collection("materials").add(newLecture);

        setToast({ 
            show: true, 
            message: lang === 'ar' ? "تمت إضافة المحاضرة بنجاح" : "Lecture added successfully" 
        });
        
        setIsModalOpen(false);
        e.target.reset();
        
        // إخفاء التوست بعد 3 ثواني
        setTimeout(() => setToast({ show: false, message: '' }), 3000);

    } catch (error) {
        console.error("Firebase Error:", error);
        alert(lang === 'ar' ? "فشل الحفظ: " + error.message : "Save failed: " + error.message);
    }
}} className="space-y-4">

                
                <div>
                    <label className={`block text-sm font-bold mb-2 ${darkMode ? 'text-gray-300' : 'text-gray-600'}`}>
                        عنوان المحاضرة (مثال: المحاضرة الأولى)
                    </label>
                    <input name="title" required type="text" className={`w-full p-3 rounded-xl border ${darkMode ? 'bg-gray-800 border-gray-700 text-white' : 'bg-gray-50 border-gray-200'}`} />
                </div>

                <div>
                    <label className={`block text-sm font-bold mb-2 ${darkMode ? 'text-gray-300' : 'text-gray-600'}`}>
                        رابط المحاضرة (درايف / يوتيوب)
                    </label>
                    <input name="url" required type="url" className={`w-full p-3 rounded-xl border ${darkMode ? 'bg-gray-800 border-gray-700 text-white' : 'bg-gray-50 border-gray-200'}`} />
                </div>

                <div>
                    <label className={`block text-sm font-bold mb-2 ${darkMode ? 'text-gray-300' : 'text-gray-600'}`}>
                        نوع الملف
                    </label>
                   <select name="type" className={`w-full p-4 rounded-2xl border-2 outline-none ${darkMode ? 'bg-gray-800 border-gray-700 text-white' : 'bg-white border-gray-100'}`}>
    <option value="video">{lang === 'ar' ? "فيديو" : "Video"}</option>
    <option value="pdf">{lang === 'ar' ? "ملف PDF" : "PDF File"}</option>
    <option value="reference">{lang === 'ar' ? "مرجع خارجي" : "Reference"}</option>
    <option value="exam">{lang === 'ar' ? "امتحان / Assignment" : "Exam"}</option>
</select>
                </div>

                <button type="submit" className="w-full py-4 bg-orange-500 hover:bg-orange-600 text-white font-black rounded-xl text-lg shadow-lg transition-all mt-4">
                    حفظ المحاضرة
                </button>

            </form>
            {/* بداية كود عرض الدروس والحذف والتعديل */}
<div className="mt-8 pt-6 border-t border-gray-100 dark:border-gray-700">
    <h3 className={`text-lg font-black mb-4 ${darkMode ? 'text-orange-400' : 'text-gray-700'}`}>
        {lang === 'ar' ? "الدروس المضافة حالياً:" : "Current Lectures:"}
    </h3>
    
    <div className="space-y-3 max-h-64 overflow-y-auto pr-2 custom-scrollbar">
        {contents
            .filter(c => 
                c.subject === modalSubjectData.subject && 
                String(c.yearId) === String(modalSubjectData.yearId) && 
                String(c.semesterId) === String(modalSubjectData.semesterId)
            )
            .sort((a, b) => a.title.toLowerCase().localeCompare(b.title.toLowerCase()))
            .map((lecture, index) => (
                <div key={lecture.id || index} className={`p-4 rounded-2xl flex justify-between items-center border transition-all ${darkMode ? 'bg-gray-800 border-gray-700' : 'bg-gray-50 border-gray-100 hover:bg-white hover:shadow-md'}`}>
                    <div className="flex flex-col">
                        <span className={`font-bold text-sm ${darkMode ? 'text-white' : 'text-gray-800'}`}>{lecture.title}</span>
                        <span className="text-[10px] text-orange-500 font-bold uppercase">{lecture.type}</span>
                    </div>
                    
                    <div className="flex gap-2">
                              <button 
                            onClick={() => handleEdit("materials", lecture.id, lecture.title, lecture.url)}
                            className="p-2 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-600 hover:text-white transition-colors"
                            title="تعديل"
                        >
                            <i data-lucide="edit-3" className="w-4 h-4"></i>
                            <span className="text-[10px] ml-1">تعديل</span>
                        </button>
                        
                        {/* زر الحذف */}
                        <button 
                            onClick={() => handleDelete("materials", lecture.id)}
                            className="p-2 bg-red-50 text-red-600 rounded-xl hover:bg-red-600 hover:text-white transition-colors"
                            title="حذف"
                        >
                            <i data-lucide="trash-2" className="w-4 h-4"></i>
                            <span className="text-[10px] ml-1">حذف</span>
                        </button>

                        {/* زر المعاينة */}
                        <a 
                            href={lecture.url} 
                            target="_blank" 
                            rel="noopener noreferrer"
                            className="p-2 bg-gray-200 text-gray-600 rounded-xl hover:bg-gray-300 transition-colors"
                        >
                            <i data-lucide="external-link" className="w-4 h-4"></i>
                        </a>
                    </div>
                </div>
            ))
        }

        {/* رسالة في حال لا توجد دروس */}
        {contents.filter(c => c.subject === modalSubjectData.subject).length === 0 && (
            <p className="text-center py-4 text-gray-400 text-sm italic">
                {lang === 'ar' ? "لا توجد دروس مضافة لهذه المادة بعد" : "No lectures added for this subject yet"}
            </p>
        )}
    </div>
</div>
{/* نهاية الكود */}
        </div>
    </div>
)}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
