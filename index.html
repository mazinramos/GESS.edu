                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'materials'));

    else if (path.length > 0) {
      event.preventDefault();
      setPath(prev => prev.slice(0, -1));
      window.history.pushState(null, null, window.location.pathname); 
    }
  };
  window.history.pushState(null, null, window.location.pathname);
  window.addEventListener('popstate', handlePopState);
  return () => {
    window.removeEventListener('popstate', handlePopState);
  };
}, [path, view]);
            
            const checkAdminAuth = (e) => {
                e.preventDefault();
                if (adminPassInput === "Gess@123") {
                    setView('admin');
                    setShowAdminAuth(false);
                    setAdminPassInput("");
                    setPath([]);
                } else {
                   setToast({ show: true, message: "🚫 خطأ: كلمة مرور الإدارة غير صحيحة" });
                    setTimeout(() => setToast({ show: false, message: '' }), 3000);
                }
            };

            const addMaterial = async (e) => {
                e.preventDefault();
                const { db, collection, addDoc, appId } = window.fb;
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData.entries());
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'materials'), {
                    ...data,
                    yearId: parseInt(data.yearId),
                    semesterId: parseInt(data.semesterId),
                    createdAt: new Date().toISOString()
                });
                e.target.reset();
                alert("تمت إضافة المادة بنجاح!");
            };

            if (view === 'login') return (
                <div className={`min-h-screen relative flex items-center justify-center p-4 overflow-hidden transition-colors duration-500 ${darkMode ? 'bg-gray-900' : ''}`}>
                    <div className="absolute inset-0 z-0">
                       <div className={`absolute inset-0 transition-colors duration-500 ${darkMode ? 'bg-black/60' : 'bg-[#f58220]/10'} mix-blend-multiply z-10`}></div>
                        <img src="https://images.unsplash.com/photo-1581092583537-20d51b4b4f1b?q=80&w=1600" className="w-full h-full object-cover blur-md scale-110" />
                    </div>
                    <div className={`relative z-20 transition-all duration-500 p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md border backdrop-blur-xl ${darkMode ? 'bg-gray-800/90 border-gray-700' : 'bg-white/80 border-white/50'}`}>
                        <div className="flex flex-col items-center mb-8">
                            <div className="w-24 h-24 bg-white rounded-full flex items-center justify-center shadow-lg p-2 mb-4 border-2 border-[#f58220]">
                                <img src={GESS_LOGO} className="w-full h-full object-contain rounded-full" />
                            </div>
                            <h1 className={`text-2xl font-black transition-colors ${darkMode ? 'text-white' : 'text-gray-800'}`}>GESS EDU PLATFORM</h1>
                            <p className="text-[#f58220] font-bold text-sm tracking-widest mt-1">هندسة المساحة - جامعة الخرطوم</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-5">
                            <div className="relative group">
                                <i data-lucide="user" className="absolute right-4 top-4 text-gray-400 group-focus-within:text-[#f58220]"></i>
                                <input name="name" required placeholder="اسم المستخدم" className="w-full pr-12 p-4 bg-white border-2 border-transparent focus:border-[#f58220] rounded-2xl outline-none font-bold shadow-inner" />
                            </div>
                            <div className="relative group">
                                <i data-lucide="lock" className="absolute right-4 top-4 text-gray-400 group-focus-within:text-[#f58220]"></i>
                                <input name="password" type="password" required placeholder="كلمة المرور" className="w-full pr-12 p-4 bg-white border-2 border-transparent focus:border-[#f58220] rounded-2xl outline-none font-bold shadow-inner" />
                            </div>
                            <button className="w-full bg-[#f58220] text-white p-4 rounded-2xl font-black shadow-lg shadow-[#f58220]/30 hover:bg-[#d96e1a] transition-all">دخول للمنصة</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className={`min-h-screen pb-20 transition-colors duration-500 ${darkMode ? 'bg-gray-900 text-white' : 'bg-[#fafafa]'}`}>
                    {showAdminAuth && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className={`p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm border transition-all ${darkMode ? 'bg-gray-800 border-gray-700 text-white' : 'bg-white border-gray-100'}`}>
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-black text-[#f58220] flex items-center gap-2"><i data-lucide="shield-check"></i> الإدارة فقط</h3>
                                    <button onClick={() => setShowAdminAuth(false)} className="p-2 hover:bg-gray-100 rounded-full"><i data-lucide="x"></i></button>
                                </div>
                                <form onSubmit={checkAdminAuth} className="space-y-4">
                                    <p className="text-xs text-gray-500 font-bold">يرجى إدخال كلمة المرور الخاصة بالمشرف.</p>
                                    <input type="password" autoFocus className="w-full p-4 bg-gray-50 rounded-2xl border-2 border-transparent focus:border-[#f58220] outline-none font-bold text-center" value={adminPassInput} onChange={(e) => setAdminPassInput(e.target.value)} />
                                    <button className="w-full bg-gray-900 text-white p-4 rounded-2xl font-black">تأكيد الهوية</button>
                                </form>
                            </div>
                        </div>
                    )}

                   <header className={`sticky top-0 z-50 border-b h-20 flex items-center transition-all ${darkMode ? 'bg-gray-800 border-gray-700 shadow-xl' : 'bg-white border-gray-100 shadow-sm'}`}>
                        <div className="max-w-6xl mx-auto px-4 w-full flex items-center justify-between">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => {setView('student'); setPath([]); setSelectedItem(null);}}>
                               <div className={`w-12 h-12 border rounded-lg p-1 transition-all ${darkMode ? 'bg-gray-700 border-gray-600' : 'bg-white border-gray-100'}`}>
                                    <img src={GESS_LOGO} className="w-full h-full object-contain" />
                                </div>
                                <div>
                                    <h1 className={`text-lg font-black leading-none transition-colors ${darkMode ? 'text-white' : 'text-gray-800'}`}>GESS EDU</h1>
                                    <p className="text-[10px] text-[#f58220] font-bold mt-1">نحو آفاق هندسية أوسع</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                               <div className={`hidden md:flex items-center gap-2 px-4 py-2 rounded-xl transition-all ${darkMode ? 'bg-gray-700 text-yellow-400' : 'bg-[#f58220]/5 text-[#f58220]'}`}>
                                    <i data-lucide="user" class="w-4 h-4"></i>
                                    <span className="text-sm font-black italic">{studentName}</span>
                                </div>
                                <div className={`flex gap-1 p-1 rounded-xl transition-colors ${darkMode ? 'bg-gray-700' : 'bg-gray-50'}`}>
                                    <button onClick={() => view === 'admin' ? setView('student') : setShowAdminAuth(true)} className={`p-3 rounded-lg ${view === 'admin' ? 'bg-[#f58220] text-white' : 'text-gray-400'}`}><i data-lucide="settings"></i></button>
                                  <button onClick={() => setDarkMode(!darkMode)} className={`p-2 rounded-lg transition-all ${darkMode ? 'bg-gray-600 text-yellow-400' : 'bg-gray-100 text-gray-600'}`}><i data-lucide={darkMode ? "sun" : "moon"} className="w-4 h-4"></i></button>
                                    <button onClick={() => {localStorage.removeItem("gess_user_name"); window.location.reload(); }} className="p-3 text-red-400"> <i data-lucide="log-out"></i></button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className={`max-w-6xl mx-auto px-4 py-8 transition-colors ${darkMode ? 'text-white' : ''}`}>
                        {view === 'admin' ? (
                            <div className="max-w-4xl mx-auto animate-in">
                                <div className={`p-8 rounded-[2.5rem] shadow-sm border transition-all ${darkMode ? 'bg-gray-800 border-gray-700 text-white' : 'bg-white border-gray-100 mb-8'}`}>
                                   <h2 className={`text-xl font-black mb-6 border-b pb-4 flex items-center gap-2 ${darkMode ? 'border-gray-700 text-white' : 'border-gray-100 text-gray-800'}`}><i data-lucide="layout-dashboard"></i> إضافة مادة</h2> 
                                    <form onSubmit={addMaterial} className="grid grid-cols-1 md:grid-cols-3 gap-5">
                                        <input name="subject" required placeholder="اسم المادة" className={`w-full p-4 rounded-2xl border-2 transition-all outline-none ${darkMode ? 'bg-gray-700 border-gray-600 text-white placeholder-gray-400 focus:border-[#f58220]' : 'bg-gray-50 border-transparent focus:bg-white focus:border-[#f58220]'}`} />
                                        <input name="title" required placeholder="عنوان الدرس" className={`w-full p-4 rounded-2xl border-2 transition-all outline-none ${darkMode ? 'bg-gray-700 border-gray-600 text-white placeholder-gray-400 focus:border-[#f58220]' : 'bg-gray-50 border-transparent focus:bg-white focus:border-[#f58220]'}`} />
                                        <input name="url" required placeholder="الرابط المباشر" className={`w-full p-4 rounded-2xl border-2 transition-all outline-none ${darkMode ? 'bg-gray-700 border-gray-600 text-white placeholder-gray-400 focus:border-[#f58220]' : 'bg-gray-50 border-transparent focus:bg-white focus:border-[#f58220]'}`} />
                                        <select name="yearId" className={`w-full p-4 rounded-2xl border-2 transition-all outline-none ${darkMode ? 'bg-gray-700 border-gray-600 text-white placeholder-gray-400 focus:border-[#f58220]' : 'bg-gray-50 border-transparent focus:bg-white focus:border-[#f58220]'}`}>
                                            {years.map(y => <option key={y.id} value={y.id}>{y.title}</option>)}
                                        </select>
                                        <select name="semesterId" className={`w-full p-4 rounded-2xl border-2 transition-all outline-none ${darkMode ? 'bg-gray-700 border-gray-600 text-white placeholder-gray-400 focus:border-[#f58220]' : 'bg-gray-50 border-transparent focus:bg-white focus:border-[#f58220]'}`}>
                                            {semesters.map(s => <option key={s.id} value={s.id}>{s.title}</option>)}
                                        </select>
                                        <select name="type" className={`w-full p-4 rounded-2xl border-2 transition-all outline-none ${darkMode ? 'bg-gray-700 border-gray-600 text-white placeholder-gray-400 focus:border-[#f58220]' : 'bg-gray-50 border-transparent focus:bg-white focus:border-[#f58220]'}`}>
                                            <option value="video">محاضرة فيديو</option>
                                            <option value="pdf">ملف ملخص</option>
                                        </select>
                                        <button className="md:col-span-3 bg-[#f58220] text-white p-5 rounded-2xl font-black">نشر المحتوى</button>
                                    </form>
                                </div>
                            </div>
                        ) : (
                            <div className={`animate-in transition-colors ${darkMode ? 'text-white' : 'text-gray-900'}`}>
                                {(path.length > 0 || selectedItem) && (
                                    <button onClick={() => selectedItem ? setSelectedItem(null) : setPath(path.slice(0, -1))} className="mb-8 flex items-center gap-2 text-[#f58220] font-black bg-white px-6 py-3 rounded-2xl shadow-sm border border-gray-50">
                                        <i data-lucide="chevron-left" class="rotate-180"></i> رجوع
                                    </button>
                                )}

                                {path.length === 0 && !selectedItem && (
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        {years.map(y => (
                                           <button key={y.id} onClick={() => setPath([{type: 'year', ...y}])} className={`p-8 rounded-[2.5rem] border transition-all duration-300 flex flex-col items-center group ${darkMode ? 'bg-gray-800 border-gray-700 shadow-2xl' : 'bg-white border-gray-100 shadow-sm hover:shadow-md'}`}>
                                                <i data-lucide="graduation-cap" class="w-12 h-12 text-[#f58220] mb-4"></i>
                                               <h3 className={`text-2xl font-black transition-colors ${darkMode ? 'text-white' : 'text-gray-800'}`}>{y.title}</h3>
                                                <p className="text-gray-400 text-sm mt-2">عرض المواد الدراسية</p>
                                            </button>
                                        ))}
                                    </div>
                                )}

                                {path.length === 1 && (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto">
                                        {semesters.map(s => (
                                            <button key={s.id} onClick={() => setPath([...path, {type: 'semester', ...s}])} className={`p-8 rounded-[2.5rem] border transition-all duration-300 flex flex-col items-center group ${darkMode ? 'bg-gray-800 border-gray-700 shadow-2xl' : 'bg-white border-gray-100 shadow-sm hover:shadow-md'}`}>
                                                <i data-lucide="book-open" class="w-16 h-16 text-[#f58220] mx-auto mb-4"></i>
                                                <h3 className={`text-3xl font-black transition-colors ${darkMode ? 'text-white' : 'text-gray-800'}`}>{s.title}</h3>
                                            </button>
                                        ))}
                                    </div>
                                )}

                                {path.length === 2 && (
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                        {Array.from(new Set(contents.filter(c => c.yearId === path[0].id && c.semesterId === path[1].id).map(c => c.subject))).map(sub => (
                                            <button key={sub} onClick={() => setPath([...path, {type: 'subject', title: sub}])} className="bg-white p-8 rounded-[2rem] border hover:bg-[#f58220]/5 text-center">
                                                <i data-lucide="folder-open" class="w-10 h-10 text-[#f58220] mx-auto mb-2"></i>
                                                <span className="font-black text-gray-700">{sub}</span>
                                            </button>
                                        ))}
                                    </div>
                                )}

                                {path.length === 3 && !selectedItem && (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                        {contents.filter(c => c.yearId === path[0].id && c.semesterId === path[1].id && c.subject === path[2].title).map(item => (
                                            <button key={item.id} onClick={() => setSelectedItem(item)} className="bg-white p-6 rounded-[2rem] border flex items-center justify-between hover:shadow-lg transition-all text-right">
                                                <div className="flex items-center gap-4">
                                                    <div className={`p-4 rounded-xl ${item.type === 'video' ? 'bg-red-50 text-red-500' : 'bg-indigo-50 text-indigo-500'}`}>
                                                        {item.type === 'video' ? <i data-lucide="video"></i> : <i data-lucide="file-text"></i>}
                                                    </div>
                                                    <div>
                                                        <h4 className="font-black text-lg">{item.title}</h4>
                                                        <p className="text-[10px] font-bold text-gray-400 italic uppercase">{item.type}</p>
                                                    </div>
                                                </div>
                                                <i data-lucide="chevron-left" class="text-gray-300"></i>
                                            </button>
                                        ))}
                                    </div>
                                )}

                                {selectedItem && (
                                    <div className="bg-white rounded-[3rem] shadow-2xl overflow-hidden animate-in">
                                        <div className="p-4 bg-gray-50 flex items-center justify-between">
                                            <span className="text-xs font-black text-gray-500">{selectedItem.subject}</span>
                                            <button onClick={() => setSelectedItem(null)} className="p-2 bg-white rounded-full"><i data-lucide="x"></i></button>
                                        </div>
                                        {selectedItem.type === 'video' ? (
                                            <div className="aspect-video bg-black">
                                                <iframe src={selectedItem.url.replace("watch?v=", "embed/")} className="w-full h-full border-none" allowFullScreen></iframe>
                                            </div>
                                        ) : (
                                            <div className="py-20 text-center bg-gradient-to-br from-[#f58220]/5 to-transparent">
                                                <i data-lucide="file-text" class="w-20 h-20 text-[#f58220]/20 mx-auto mb-6"></i>
                                                <h3 className="text-2xl font-black mb-10">{selectedItem.title}</h3>
                                                <a href={selectedItem.url} target="_blank" className="bg-[#f58220] text-white px-10 py-4 rounded-full font-black shadow-xl">تحميل / فتح الملف</a>
                                            </div>
                                        )}
                                        <div className="p-10">
                                            <h2 className="text-3xl font-black text-gray-900">{selectedItem.title}</h2>
                                            <p className="mt-4 text-gray-500 font-medium">تم رفع هذا المحتوى بواسطة قسم هندسة المساحة لخدمة الطلاب أكاديمياً.</p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                    <footer className="fixed bottom-0 left-0 right-0 h-10 bg-white/50 backdrop-blur-md border-t flex items-center justify-center">
                        <p className="text-[10px] font-black text-gray-400">GESS • UNIVERSITY OF KHARTOUM • GEOMATICS ENGINEERING</p>
                    </footer>
                    {toast.show && (
  <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] animate-bounce">
    <div className="bg-gray-800 text-white px-6 py-3 rounded-2xl shadow-2xl border border-gray-700 flex items-center gap-3">
      <div className="w-2 h-2 rounded-full bg-[#f58220]"></div>
      <span className="font-bold text-sm">{toast.message}</span>
    </div>
  </div>
)}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
